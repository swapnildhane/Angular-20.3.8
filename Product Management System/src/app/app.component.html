<h2 class="MainHeading">Product MS</h2>

<h3 class="MiniHeading">Add Product </h3>
<label>Product Name </label><br>
<input type="text" [(ngModel)]="name" placeholder="Product Name">
<br><br>
<label> Price </label><br>
<input type="number" [(ngModel)]="price" placeholder="Price"><br><br>
<button (click)="addProduct()" > Add Product </button>
<hr>
<h3 class="MiniHeading"> Filer by Price </h3>
<input type="number" [(ngModel)]="filterPrice" placeholder="Minimun price">
<hr>
<h3 class="MiniHeading"> Product List </h3>
<table border="1" class="table">
  <tr>
    <th>Name</th>
    <th>Price </th>
    <th>Action</th>
  </tr>
  <tr *ngFor="let p of ProductService.getProducts()">
    <td>{{p.name}}</td>
    <td>{{p.price}}</td>
    <td>
      <button (click)="deleteProduct(p.id)">Delete</button>
    </td>
  </tr>
</table>
